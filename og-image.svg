<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="lime-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#C8FA3C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8FA3C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060608"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top-left corner accent -->
  <polygon points="0,0 80,0 0,80" fill="#C8FA3C"/>

  <!-- Logo mark -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="36" height="36" fill="#C8FA3C"/>
    <rect x="0" y="0" width="36" height="2" fill="#060608"/>
    <text x="52" y="26" font-family="'Inter Tight', Inter, sans-serif" font-size="22" font-weight="700" fill="#F2F0E8" letter-spacing="-0.02em">WeChaser</text>
  </g>

  <!-- Status pill -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="370" height="32" rx="16" fill="#0E0E10" stroke="rgba(200,250,60,0.25)"/>
    <circle cx="18" cy="16" r="4" fill="#C8FA3C"/>
    <text x="32" y="21" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="600" fill="#F2F0E8" letter-spacing="0.14em">DEPLOYED · 3 LIVE ENGAGEMENTS</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(80, 250)">
    <text font-family="'Inter Tight', Inter, sans-serif" font-size="80" font-weight="800" fill="#F2F0E8" letter-spacing="-0.025em">
      <tspan x="0" y="70">Make every AI tool</tspan>
      <tspan x="0" y="160">know your <tspan fill="#060608" style="background:#C8FA3C"><tspan fill="#C8FA3C">company</tspan></tspan>.</tspan>
    </text>
  </g>

  <!-- Box behind "company" word -->
  <rect x="354" y="357" width="270" height="78" fill="#C8FA3C"/>
  <text x="368" y="420" font-family="'Inter Tight', Inter, sans-serif" font-size="80" font-weight="800" fill="#060608" letter-spacing="-0.025em">company</text>
  <text x="638" y="420" font-family="'Inter Tight', Inter, sans-serif" font-size="80" font-weight="800" fill="#F2F0E8" letter-spacing="-0.025em">.</text>

  <!-- Bottom strip -->
  <line x1="80" y1="500" x2="1120" y2="500" stroke="rgba(255,255,255,0.08)"/>

  <!-- Stats -->
  <g transform="translate(80, 535)" font-family="'Inter Tight', Inter, sans-serif">
    <g>
      <text x="0" y="36" font-size="36" font-weight="700" fill="#C8FA3C" letter-spacing="-0.025em">534</text>
      <text x="0" y="58" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" font-weight="500" fill="rgba(242,240,232,0.5)" letter-spacing="0.14em">GRAPH NODES</text>
    </g>
    <g transform="translate(220, 0)">
      <text x="0" y="36" font-size="36" font-weight="700" fill="#C8FA3C" letter-spacing="-0.025em">313<tspan font-family="'JetBrains Mono'" font-size="14" fill="rgba(242,240,232,0.5)" font-weight="500">/319</tspan></text>
      <text x="0" y="58" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" font-weight="500" fill="rgba(242,240,232,0.5)" letter-spacing="0.14em">TESTS PASSED · 98.1%</text>
    </g>
    <g transform="translate(530, 0)">
      <text x="0" y="36" font-size="36" font-weight="700" fill="#C8FA3C" letter-spacing="-0.025em">100<tspan font-family="'JetBrains Mono'" font-size="22" fill="#C8FA3C" font-weight="500">%</tspan></text>
      <text x="0" y="58" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" font-weight="500" fill="rgba(242,240,232,0.5)" letter-spacing="0.14em">CITATION · ZERO HALLUC</text>
    </g>
    <g transform="translate(880, 0)">
      <text x="0" y="36" font-size="36" font-weight="700" fill="#C8FA3C" letter-spacing="-0.025em">on-prem</text>
      <text x="0" y="58" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" font-weight="500" fill="rgba(242,240,232,0.5)" letter-spacing="0.14em">AIR-GAPPABLE</text>
    </g>
  </g>

  <!-- Right side label -->
  <g transform="translate(1080, 90)" text-anchor="end">
    <text font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="500" fill="rgba(242,240,232,0.5)" letter-spacing="0.16em">WECHASER · ENTERPRISE AI MIDDLEWARE</text>
    <text y="20" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="500" fill="rgba(242,240,232,0.32)" letter-spacing="0.14em">WECHASER.AI</text>
  </g>
</svg>
